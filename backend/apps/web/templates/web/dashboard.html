{% extends "web/base.html" %}
{% block title %}Dashboard | Resume2Portfolio{% endblock %}
{% block content %}
<section class="dashboard-wrap">
  <section class="row space-between dashboard-head">
    <div>
      <h1>Your Portfolios</h1>
      <p>Manage and export your developer portfolios.</p>
    </div>
    <a class="btn dashboard-create" href="/upload-resume/">+ Create New Portfolio</a>
  </section>

  <p id="error" class="error"></p>
  <div id="portfolio-list" class="stack dashboard-list"></div>
</section>
{% endblock %}
{% block scripts %}
<script>
  App.requireAuth();
  App.updateNav();

  const list = document.getElementById('portfolio-list');
  const error = document.getElementById('error');

  const templateLabelMap = {
    minimal: 'Minimal Theme',
    dark: 'Premium Dark',
    cards: 'Cards Theme',
    terminal: 'Terminal Theme',
    robotic: 'Robotic Theme',
    professional: 'Professional Theme',
    creative: 'Creative Theme',
  };

  function fmtDate(value) {
    try {
      return new Date(value).toLocaleDateString();
    } catch {
      return value || '';
    }
  }

  function initialFromTemplate(templateId) {
    const id = (templateId || '').trim();
    return id ? id[0].toUpperCase() : 'P';
  }

  async function loadPortfolios() {
    error.textContent = '';
    list.innerHTML = '';
    try {
      const items = await App.get('/api/portfolios/');
      if (!items.length) {
        list.innerHTML = '<p class="dashboard-empty">No portfolios yet. Create one to get started.</p>';
        return;
      }
      items.forEach((item) => {
        const div = document.createElement('div');
        const templateName = templateLabelMap[item.template_id] || item.template_id;
        const dateText = fmtDate(item.updated_at);
        div.className = 'dashboard-item';
        div.innerHTML = `
          <div class="dashboard-item-left">
            <div class="dashboard-avatar">${initialFromTemplate(item.template_id)}</div>
            <div>
              <p class="dashboard-item-title">${templateName}</p>
              <p class="dashboard-item-sub">◷ Updated ${dateText}</p>
            </div>
          </div>
          <div class="row dashboard-item-actions">
            <a class="btn dashboard-edit" href="/editor/${item.id}/">✎ Edit Details</a>
            <button class="btn dashboard-export export-btn" data-id="${item.id}">↧ Export</button>
          </div>
        `;
        list.appendChild(div);
      });

      document.querySelectorAll('.export-btn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          try {
            await App.download(`/api/portfolios/${btn.dataset.id}/export_files/`, `portfolio-${btn.dataset.id}.html`);
          } catch (err) {
            error.textContent = App.errorMessage(err, 'Failed to export portfolio.');
          }
        });
      });
    } catch (err) {
      error.textContent = App.errorMessage(err, 'Failed to load portfolios.');
    }
  }

  loadPortfolios();
</script>
{% endblock %}
